services:
  app:
    image: videolibrary-app:0.1.0
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_NAME: videolibrary
      APP_ENV: local
      HTTP_ADDR: 0.0.0.0:8080
      POSTGRES_DSN: postgres://videolibrary:videolibrary@postgres:5432/videolibrary?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_POOL_SIZE: "50"
      REDIS_MIN_IDLE_CONNS: "10"
      SEAWEEDFS_PUBLIC_URL: http://seaweedfs:8888
      LOG_LEVEL: info
      LOG_FORMAT: json
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy

  postgres:
    image: postgres:18.4-trixie
    environment:
      POSTGRES_DB: videolibrary
      POSTGRES_USER: videolibrary
      POSTGRES_PASSWORD: videolibrary
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  redis:
    image: redis:8.8.0-trixie
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  seaweedfs:
    image: chrislusf/seaweedfs:4.32
    command:
      - server
      - -dir=/data
      - -ip=seaweedfs
      - -ip.bind=0.0.0.0
      - -master.port=9333
      - -volume.port=8080
      - -filer
      - -filer.port=8888
    ports:
      - "8888:8888"
      - "9333:9333"
      - "8081:8080"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9333/cluster/status >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
  seaweedfs-data:
