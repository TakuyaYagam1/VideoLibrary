ErrorResponse:
  type: object
  additionalProperties: false
  required:
    - code
    - message
  properties:
    code:
      type: string
      minLength: 1
      description: Stable machine-readable error code.
      example: video_not_found
    message:
      type: string
      minLength: 1
      description: Human-readable error message.
      example: video not found
