name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_FILE: backend/go.mod
  GO_CACHE_DEPENDENCY_PATH: backend/go.sum

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: backend
          args: --config=.golangci.yml ./...

      - name: Lint integration tests
        working-directory: backend
        run: make lint-integration

      - name: Lint e2e tests
        working-directory: backend
        run: make lint-e2e

  security:
    name: security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: 8.24.3
      CI_COMPOSE_ENV: .env.ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install gitleaks
        run: |
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: |
          mkdir -p artifacts
          gitleaks detect --source . --redact -v --exit-code=2 --report-format=sarif --report-path=artifacts/gitleaks-results.sarif

      - name: Upload gitleaks artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: gitleaks-artifacts
          path: artifacts/
          if-no-files-found: ignore

      - name: Prepare compose validation env
        run: |
          cp .env.example "${CI_COMPOSE_ENV}"
          hash="$(docker run --rm caddy:2.11.4-alpine caddy hash-password --plaintext ci-seaweedfs-password)"
          export SEAWEEDFS_ADMIN_BASIC_AUTH_HASH="${hash}"
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["CI_COMPOSE_ENV"])
          replacements = {
              "POSTGRES_PASSWORD": "ci-postgres-password",
              "REDIS_PASSWORD": "ci-redis-password",
              "SEAWEEDFS_ADMIN_PASSWORD": "ci-seaweedfs-password",
              "SEAWEEDFS_ADMIN_BASIC_AUTH_HASH": f"'{os.environ['SEAWEEDFS_ADMIN_BASIC_AUTH_HASH']}'",
          }

          lines = []
          for line in path.read_text().splitlines():
              key = line.split("=", 1)[0]
              if key in replacements:
                  lines.append(f"{key}={replacements[key]}")
              else:
                  lines.append(line)
          path.write_text("\n".join(lines) + "\n")
          PY

      - name: Validate compose config
        working-directory: backend
        run: ENV_FILE=../${CI_COMPOSE_ENV} make verify-compose

      - name: Validate Caddy config
        working-directory: backend
        run: ENV_FILE=../${CI_COMPOSE_ENV} make verify-caddy

  deps-audit:
    name: deps-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}

      - name: Install govulncheck
        working-directory: backend
        run: |
          GOBIN="${PWD}/bin" go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run dependency audit
        working-directory: backend
        run: |
          mkdir -p ../artifacts
          set -o pipefail
          make deps-audit 2>&1 | tee ../artifacts/deps-audit.log

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: deps-audit-artifacts
          path: artifacts/
          if-no-files-found: ignore

  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}

      - name: Run tests with race detector
        working-directory: backend
        run: |
          mkdir -p ../artifacts
          set -o pipefail
          make test-race 2>&1 | tee ../artifacts/unit.log

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: unit-artifacts
          path: artifacts/
          if-no-files-found: ignore

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}

      - name: Build Go binary
        working-directory: backend
        run: |
          mkdir -p ../artifacts
          set -o pipefail
          go build ./... 2>&1 | tee ../artifacts/go-build.log

      - name: Build Docker image
        run: |
          mkdir -p artifacts
          set -o pipefail
          docker build -t videolibrary-app:ci -f backend/Dockerfile backend 2>&1 | tee artifacts/docker-build.log

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          path: artifacts/
          if-no-files-found: ignore
